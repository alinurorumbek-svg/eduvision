<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduVision AI // Mobile Adaptive Suite</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0d11; --sidebar: #13151a; --card: #1c1f26;
            --accent: #00f2ff; --text: #bdc1c6; --text-bright: #ffffff;
            --google-blue: #8ab4f8; --radius: 20px;
        }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif; margin: 0; display: flex; 
            min-height: 100vh; overflow-x: hidden;
        }

        /* SIDEBAR - Адаптивтілігі */
        .sidebar {
            width: 260px; background: var(--sidebar); border-right: 1px solid #303134;
            display: flex; flex-direction: column; padding: 16px; gap: 4px;
            transition: 0.3s;
        }

        /* Телефонда Sidebar-ды жасыру немесе өзгерту */
        @media (max-width: 768px) {
            .sidebar { width: 70px; padding: 10px; }
            .logo span, .nav-item span:last-child, .group-title { display: none; }
            .nav-item { justify-content: center; padding: 12px; }
        }

        .logo {
            display: flex; align-items: center; gap: 10px; padding: 12px 16px;
            font-family: 'Google Sans', sans-serif; font-weight: 700; font-size: 18px;
            color: var(--text-bright); margin-bottom: 12px;
        }

        .nav-item {
            display: flex; align-items: center; gap: 12px; padding: 10px 16px;
            border-radius: var(--radius); cursor: pointer; font-size: 13.5px;
            color: var(--text); transition: 0.2s; font-weight: 500;
        }

        .nav-item:hover { background: rgba(255,255,255,0.05); }
        .nav-item.active { background: #3c4043; color: var(--google-blue); }

        .group-title {
            font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px;
            padding: 16px 16px 8px; color: #80868b; font-weight: 600;
        }

        /* MAIN CONTENT - Адаптивті тор (Grid) */
        .main { flex: 1; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .view { display: none; max-width: 1000px; margin: 0 auto; }
        .view.active { display: block; }

        .card {
            background: var(--card); border-radius: 16px; padding: 20px;
            border: 1px solid #303134; box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        /* GRID - Телефонда 1 бағанға айналады */
        .analysis-grid {
            display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px;
        }

        @media (max-width: 900px) {
            .analysis-grid { grid-template-columns: 1fr; }
        }

        h2 { font-family: 'Google Sans', sans-serif; font-size: 20px; color: #fff; margin-top: 0; }
        
        textarea {
            width: 100%; height: 100px; background: #0b0d11; border: 1px solid #3c4043;
            border-radius: 12px; color: #fff; padding: 12px; font-size: 14px;
            resize: none; outline: none; margin: 15px 0; box-sizing: border-box;
        }

        .btn-main {
            background: var(--google-blue); color: #202124; font-weight: 600;
            padding: 10px 20px; border-radius: 20px; border: none; cursor: pointer;
            font-size: 13px;
        }

        .chart-wrapper {
            background: rgba(255,255,255,0.02); padding: 15px;
            border-radius: 16px; border: 1px solid #303134; min-height: 300px;
        }
        
        #chart-container { position: relative; height: 250px; width: 100%; }

        /* Оптималды кестенің адаптивтілігі */
        .opt-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
        .opt-item { 
            background: #1c1f26; padding: 10px; border-radius: 12px; 
            font-size: 12.5px; border: 1px solid #3c4043; color: #fff;
        }

        .settings-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; background: rgba(255,255,255,0.03);
            border-radius: 12px; margin-bottom: 8px; border: 1px solid #3c4043;
            flex-wrap: wrap; gap: 10px;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">🍀 <span>EduVision AI</span></div>
    
    <div class="group-title">АНАЛИЗАТОР</div>
    <div class="nav-item active" onclick="switchView('main', this)"><span>◈</span> <span id="m-core">Neural Core</span></div>
    <div class="nav-item" onclick="switchView('relevance', this)"><span>◔</span> <span id="m-rel">Өзектілігі</span></div>

    <div class="group-title">ЖҮЙЕ</div>
    <div class="nav-item" onclick="switchView('settings', this)"><span>⚙</span> <span id="m-set">Баптаулар</span></div>
</div>

<div class="main">
    <div id="view-main" class="view active">
        <div class="card">
            <h2 id="h-main">Schedule Neural Processing</h2>
            <textarea id="scheduleInput" placeholder="Сабақ кестесін енгізіңіз..."></textarea>
            <div style="display:flex; justify-content: space-between; gap: 10px;">
                <button class="btn-main" style="background:transparent; border:1px solid #5f6368; color:#fff;" onclick="document.getElementById('f').click()">OCR</button>
                <input type="file" id="f" hidden onchange="doOCR(event)">
                <button class="btn-main" onclick="doAnalysis()" id="b-run">RUN ANALYSIS</button>
            </div>
        </div>
        
        <div id="res" style="display:none;">
            <div class="analysis-grid">
                <div id="aiOut" class="card" style="font-size:13px; line-height: 1.6;"></div>
                
                <div class="chart-wrapper">
                    <h3 id="chart-title" style="margin:0 0 10px 0; font-size:15px; color:#fff;">Динамика нагрузки</h3>
                    <div id="chart-container">
                        <canvas id="ch"></canvas>
                    </div>
                    <div id="chart-desc" style="margin-top:15px; font-size:12px; border-top:1px solid #333; padding-top:10px;"></div>
                </div>
            </div>

            <div id="opt-box" class="card" style="margin-top:20px; border-color: rgba(52, 168, 83, 0.3); background: rgba(52, 168, 83, 0.02); display:none;">
                <div style="color: #34a853; font-weight: 600; margin-bottom: 15px;" id="opt-title">✅ Оңтайлы кесте:</div>
                <div class="opt-list" id="opt-list"></div>
            </div>
        </div>
    </div>

    <div id="view-settings" class="view">
        <div class="card">
            <h2 id="h-set">Settings</h2>
            <div class="settings-row">
                <span id="s-lang">Интерфейс тілі</span>
                <select onchange="setLang(this.value)" style="background:#202124; color:#fff; border:1px solid #3c4043; border-radius:8px; padding:5px;">
                    <option value="kk">Қазақша</option>
                    <option value="ru">Русский</option>
                    <option value="en">English</option>
                </select>
            </div>
        </div>
    </div>
</div>

<script>
    let currentLang = 'kk';

    const langDB = {
        kk: { hMain: "Кесте талдау", bRun: "ТАЛДАУ", optTitle: "✅ Оңтайлы кесте:", chartTitle: "Танымдық жүктеме" },
        ru: { hMain: "Анализ расписания", bRun: "АНАЛИЗ", optTitle: "✅ Оптимальное расписание:", chartTitle: "Когнитивная нагрузка" },
        en: { hMain: "Schedule Analysis", bRun: "ANALYZE", optTitle: "✅ Optimal Schedule:", chartTitle: "Cognitive Load" }
    };

    function setLang(l) {
        currentLang = l;
        document.getElementById('h-main').innerText = langDB[l].hMain;
        document.getElementById('b-run').innerText = langDB[l].bRun;
        document.getElementById('opt-title').innerText = langDB[l].optTitle;
        document.getElementById('chart-title').innerText = langDB[l].chartTitle;
    }

    function switchView(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('view-' + id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    }

    async function doAnalysis() {
        const text = document.getElementById('scheduleInput').value;
        if(!text) return;
        document.getElementById('res').style.display = 'block';
        document.getElementById('aiOut').innerText = "Computing...";
        
        // Модельдеу (Симуляция)
        setTimeout(() => {
            document.getElementById('aiOut').innerHTML = "<b>AI Analysis:</b> Кестеде 4-сабақтан кейін зейіннің төмендеуі байқалады. Демалыс қажет.";
            draw(text.split('\n').filter(l => l.trim()).length || 6);
        }, 800);
    }

    function draw(count) {
        const ctx = document.getElementById('ch').getContext('2d');
        if(window.cObj) window.cObj.destroy();

        let dataValues = [];
        let energy = 100;
        for(let i=0; i<count; i++) {
            energy *= Math.exp(-0.18);
            dataValues.push(Math.round(energy));
        }

        // Оңтайлы кестені шығару
        const optBox = document.getElementById('opt-box');
        const optList = document.getElementById('opt-list');
        optList.innerHTML = '';
        for(let i=1; i<=count; i++) {
            optList.innerHTML += `<div class="opt-item"><b>${i}.</b> Subject ${i}</div>`;
        }
        optBox.style.display = 'block';

        // ГРАФИК РЕСПОНСИВТІ
        window.cObj = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array.from({length: count}, (_, i) => (i+1) + '-ур'),
                datasets: [{
                    data: dataValues,
                    borderColor: '#8ab4f8',
                    backgroundColor: 'rgba(138, 180, 248, 0.2)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false, // Бұл графиктің контейнерге сыюын қамтамасыз етеді
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true, max: 100, grid: { color: '#333' } },
                    x: { grid: { display: false } }
                }
            }
        });
    }

    function doOCR(e) {
        alert("OCR Scanning started...");
    }
</script>
</body>
</html>
