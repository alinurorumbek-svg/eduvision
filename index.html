<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduVision AI // Collapsible Sidebar</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0d11; --sidebar: #13151a; --card: #1c1f26;
            --accent: #00f2ff; --text: #bdc1c6; --text-bright: #ffffff;
            --google-blue: #8ab4f8; --radius: 12px;
        }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif; margin: 0; display: flex; 
            min-height: 100vh; transition: 0.3s;
        }

        /* SIDEBAR STYLE */
        .sidebar {
            width: 260px; background: var(--sidebar); border-right: 1px solid #303134;
            display: flex; flex-direction: column; padding: 16px; gap: 4px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; flex-shrink: 0;
        }

        /* SIDEBAR COLLAPSED STATE */
        .sidebar.collapsed { width: 70px; }
        .sidebar.collapsed .logo span, 
        .sidebar.collapsed .nav-item span:last-child, 
        .sidebar.collapsed .group-title {
            display: none;
        }
        .sidebar.collapsed .nav-item { justify-content: center; }

        .toggle-btn {
            position: absolute; right: -12px; top: 25px;
            width: 24px; height: 24px; background: var(--google-blue);
            border-radius: 50%; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.5); z-index: 10;
        }

        .logo {
            display: flex; align-items: center; gap: 10px; padding: 12px 16px;
            font-family: 'Google Sans', sans-serif; font-weight: 700; font-size: 18px;
            color: var(--text-bright); margin-bottom: 12px; overflow: hidden;
        }

        .nav-item {
            display: flex; align-items: center; gap: 12px; padding: 12px 16px;
            border-radius: var(--radius); cursor: pointer; font-size: 13.5px;
            color: var(--text); transition: 0.2s; font-weight: 500; white-space: nowrap;
        }
        .nav-item:hover { background: rgba(255,255,255,0.05); }
        .nav-item.active { background: #3c4043; color: var(--google-blue); }

        .group-title {
            font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px;
            padding: 16px 16px 8px; color: #80868b; font-weight: 600;
        }

        /* MAIN CONTENT */
        .main { flex: 1; overflow-y: auto; padding: 24px; transition: 0.3s; }
        .view { display: none; max-width: 1000px; margin: 0 auto; }
        .view.active { display: block; }

        .card {
            background: var(--card); border-radius: 16px; padding: 24px;
            border: 1px solid #303134; margin-bottom: 24px;
        }

        .analysis-grid {
            display: grid; grid-template-columns: 1fr 1.5fr; gap: 24px;
        }

        @media (max-width: 900px) {
            .analysis-grid { grid-template-columns: 1fr; }
            .sidebar { width: 70px; } /* Планшетте автоматты жиналады */
            .sidebar .logo span, .sidebar .nav-item span:last-child, .sidebar .group-title { display: none; }
        }

        textarea {
            width: 100%; height: 120px; background: #0b0d11; border: 1px solid #3c4043;
            border-radius: 12px; color: #fff; padding: 16px; font-size: 14px;
            resize: none; outline: none; margin: 16px 0; box-sizing: border-box;
        }

        .btn-main {
            background: var(--google-blue); color: #202124; font-weight: 600;
            padding: 12px 24px; border-radius: 20px; border: none; cursor: pointer;
        }

        #chart-container { height: 300px; width: 100%; position: relative; }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <button class="toggle-btn" onclick="toggleSidebar()">⟨</button>
    <div class="logo">🍀 <span>EduVision AI</span></div>
    
    <div class="group-title">АНАЛИЗАТОР</div>
    <div class="nav-item active" onclick="switchView('main', this)"><span>◈</span> <span>Neural Core</span></div>
    <div class="nav-item" onclick="switchView('settings', this)"><span>⚙</span> <span>Баптаулар</span></div>
</div>

<div class="main">
    <div id="view-main" class="view active">
        <div class="card">
            <h2>AI Schedule Processor</h2>
            <textarea id="scheduleInput" placeholder="Оқу кестесін осында енгізіңіз..."></textarea>
            <div style="display:flex; justify-content: space-between;">
                <button class="btn-main" onclick="doAnalysis()">RUN ANALYSIS</button>
            </div>
        </div>

        <div id="res" style="display:none;" class="analysis-grid">
            <div id="aiOut" class="card" style="font-size:14px; line-height:1.6;"></div>
            <div class="card">
                <h3 style="margin-top:0">Танымдық жүктеме графигі</h3>
                <div id="chart-container">
                    <canvas id="ch"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div id="view-settings" class="view">
        <div class="card">
            <h2>Settings</h2>
            <p>Интерфейс тілін таңдаңыз:</p>
            <select style="background:#202124; color:#fff; border:1px solid #3c4043; padding:8px; border-radius:8px;">
                <option>Қазақша</option>
                <option>Русский</option>
                <option>English</option>
            </select>
        </div>
    </div>
</div>

<script>
    // SIDEBAR ЖИНАУ ФУНКЦИЯСЫ
    function toggleSidebar() {
        const sb = document.getElementById('sidebar');
        const btn = document.querySelector('.toggle-btn');
        sb.classList.toggle('collapsed');
        
        if (sb.classList.contains('collapsed')) {
            btn.innerText = '⟩'; // Оңға қараған көрсеткіш
        } else {
            btn.innerText = '⟨'; // Солға қараған көрсеткіш
        }
        
        // Графиктің өлшемін жаңарту (өлшем өзгергенде қисаймауы үшін)
        setTimeout(() => {
            if(window.cObj) window.cObj.resize();
        }, 300);
    }

    function switchView(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('view-' + id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    }

    function doAnalysis() {
        const text = document.getElementById('scheduleInput').value;
        if(!text) return;
        document.getElementById('res').style.display = 'grid';
        document.getElementById('aiOut').innerHTML = "<b>Анализ нәтижесі:</b> Экспоненциалды модель бойынша 4-сабақтан кейін зейін коэффиценті 42%-ға төмендейді.";
        draw(6);
    }

    function draw(count) {
        const ctx = document.getElementById('ch').getContext('2d');
        if(window.cObj) window.cObj.destroy();
        
        window.cObj = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array.from({length: count}, (_, i) => (i+1) + '-сабақ'),
                datasets: [{
                    data: [95, 88, 75, 50, 38, 30],
                    borderColor: '#8ab4f8',
                    backgroundColor: 'rgba(138, 180, 248, 0.2)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true, max: 100, grid: { color: '#333' } },
                    x: { grid: { display: false } }
                }
            }
        });
    }
</script>
</body>
</html>
