<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>EduVision AI</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        body { background: #020409; color: #c8deff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { background: #0d1526; border: 1px solid #1a2a4a; padding: 25px; border-radius: 15px; max-width: 600px; width: 100%; }
        textarea { width: 100%; height: 100px; background: #000; color: #fff; border: 1px solid #1a2a4a; padding: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #00d4ff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #status { color: #00d4ff; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>EduVision AI: Кесте талдау</h2>
        <textarea id="userInput" placeholder="1. Математика, 2. Физика..."></textarea>
        <button onclick="sendToAI()">AI ТАЛДАУ ЖАСАУ</button>
        <div id="status"></div>
        <div id="aiText" style="margin-top:20px;"></div>
    </div>

    <script>
        async function sendToAI() {
            const text = document.getElementById('userInput').value;
            const status = document.getElementById('status');
            if(!text) return alert("Кестені енгізіңіз");

            status.innerText = "⏳ AI ойлануда...";

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ schedule: text })
                });

                const data = await response.json();
                document.getElementById('aiText').innerHTML = "<b>AI Жауабы:</b><br>" + data.aiResponse;
                status.innerText = "✅ Дайын!";
            } catch (e) {
                status.innerText = "❌ Қате: Сервер байланысы жоқ";
            }
        }
    </script>
</body>
</html>
